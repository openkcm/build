version: 3

includes:
  build:img:
    taskfile: tasks_build_img.yaml
    internal: true
  build:ocm:
    taskfile: tasks_build_ocm.yaml
    internal: true
  tools:
    taskfile: tasks_tools.yaml
    internal: true

tasks:
  # This is a dummy task that serves as a separator between task namespaces in the 'task -l' output.
  "---":
    desc: "{{.BLD_CMK_IMG_SEP}}"
    cmds:
    - cmd: echo "{{.SEP_MSG}}"
      silent: true

  all:
    desc: "Push the multi-platform image for many composite images including the plugins."
    requires:
      vars:
        - VERSION
    cmds:
      - echo "Executing branch logic for COMPOSITE_COMPONENTS={{.COMPOSITE_COMPONENTS}}"
      - task: all-batch
        if: '[[ -n "{{.COMPOSITE_COMPONENTS}}" ]]'
      - task: all-single
        if: '[[ -z "{{.COMPOSITE_COMPONENTS}}" ]]'

  all-batch:
    internal: true
    requires:
      vars:
        - VERSION
    cmds:
      - for: { var: COMPOSITE_COMPONENTS }
        cmd: echo "Looping over {{.ITEM.COMPONENT_NAME}} with base {{.ITEM.BASE_IMAGE_NAME}}"

      - for: { var: COMPOSITE_COMPONENTS }
        task: single
        vars:
          VERSION: '{{.VERSION}}'
          COMPOSITE_COMPONENT_NAME: '{{.ITEM.COMPONENT_NAME | default ""}}'
          COMPOSITE_DOCKER_FILE_IDENTIFIER: '{{.ITEM.DOCKER_FILE_IDENTIFIER | default ""}}'
          COMPOSITE_BASE_IMAGE_NAME: '{{.ITEM.BASE_IMAGE_NAME | default ""}}'
          COMPOSITE_PLUGINS_IMAGE_NAME: '{{.ITEM.PLUGINS_IMAGE_NAME | default ""}}'

  all-single:
    internal: true
    status:
      # If any of these variables are empty (-z), this evaluates to true (exit code 0).
      # Task considers exit code 0 in 'status' as "up-to-date" and silently skips the task.
      - '[ -z "{{.COMPOSITE_COMPONENT_NAME}}" ] || [ -z "{{.COMPOSITE_DOCKER_FILE_IDENTIFIER}}" ] || [ -z "{{.COMPOSITE_BASE_IMAGE_NAME}}" ] || [ -z "{{.COMPOSITE_PLUGINS_IMAGE_NAME}}" ]'
    requires:
      vars:
        - VERSION
    cmds:
      - task: single
        vars:
          VERSION: '{{.VERSION}}'
          COMPOSITE_COMPONENT_NAME: '{{.COMPOSITE_COMPONENT_NAME}}'
          COMPOSITE_DOCKER_FILE_IDENTIFIER: '{{.COMPOSITE_DOCKER_FILE_IDENTIFIER}}'
          COMPOSITE_BASE_IMAGE_NAME: '{{.COMPOSITE_BASE_IMAGE_NAME}}'
          COMPOSITE_PLUGINS_IMAGE_NAME: '{{.COMPOSITE_PLUGINS_IMAGE_NAME}}'

  single:
    desc: "  Push the multi-platform image for composite image that does including the plugins."
    requires:
      vars:
        - VERSION
        - COMPOSITE_COMPONENT_NAME
        - COMPOSITE_DOCKER_FILE_IDENTIFIER
        - COMPOSITE_BASE_IMAGE_NAME
        - COMPOSITE_PLUGINS_IMAGE_NAME
    vars:
      ROOT_IMAGE:
        sh: 'PROJECT_ROOT="{{.ROOT_DIR2}}" REPO_NAME="{{.REPO_NAME}}"  {{.TASKFILE_DIR2}}/get-registry.sh --image'
      IMAGE_SIGNING_ENABLED: '{{ env "IMAGE_SIGNING_ENABLED" | default "false" }}'
      OCM_SIGNING_ENABLED: '{{ env "OCM_SIGNING_ENABLED" | default "false" }}'
    cmds:
      - task: build:img:prepare-docker-builder
      - for:
          matrix:
            OS: [ "linux" ]
            ARCH: [ "amd64", "arm64" ]
        vars:
          OS: '{{.ITEM.OS}}'
          ARCH: '{{.ITEM.ARCH}}'
          BASE_IMAGE: '{{.ROOT_IMAGE}}/{{.COMPOSITE_COMPONENT_NAME}}'
          IMAGE_SIGNING_ENABLED: '{{.IMAGE_SIGNING_ENABLED}}'
          OCM_SIGNING_ENABLED: '{{.OCM_SIGNING_ENABLED}}'
          COMPOSITE_COMPONENT_NAME: '{{.COMPOSITE_COMPONENT_NAME}}'
          COMPOSITE_DOCKER_FILE_IDENTIFIER: '{{.COMPOSITE_DOCKER_FILE_IDENTIFIER}}'
          COMPOSITE_PLUGINS_IMAGE_NAME: '{{.COMPOSITE_PLUGINS_IMAGE_NAME}}'
          COMPOSITE_BASE_IMAGE_NAME: '{{.COMPOSITE_BASE_IMAGE_NAME}}'
        task: push-multi-internal
      - task: push-manifest-internal
        vars:
          BASE_IMAGE: '{{.ROOT_IMAGE}}/{{.COMPOSITE_COMPONENT_NAME}}'
          COMPOSITE_BASE_IMAGE_NAME: '{{.COMPOSITE_BASE_IMAGE_NAME}}'
          COMPOSITE_COMPONENT_NAME: '{{.COMPOSITE_COMPONENT_NAME}}'
          IMAGE_SIGNING_ENABLED: '{{.IMAGE_SIGNING_ENABLED}}'

  push-multi-internal:
    desc: "  Build a the composite image."
    deps:
      - tools:jq
      - tools:crane
      - tools:cosign
      - tools:localtmp
    requires:
      vars:
        - BASE_IMAGE
        - OS
        - ARCH
        - VERSION
        - DOCKER_BUILDER_NAME
        - GHCR_PAT
        - GITHUB_ACTOR
        - COMPOSITE_BASE_IMAGE_NAME
        - COMPOSITE_PLUGINS_IMAGE_NAME
        - COMPOSITE_COMPONENT_NAME
        - IMAGE_SIGNING_ENABLED
        - COMPOSITE_DOCKER_FILE_IDENTIFIER
    cmds:
      - '[[ "{{.OS}}" == "linux" ]] || { echo "The distroless base image does only support linux as operating system."; exit 1; }'
      - |
        FILE_NAME="Dockerfile.{{.COMPOSITE_DOCKER_FILE_IDENTIFIER}}"
       
        if [ -f "{{.PROJECT_ROOT_DIR}}/${FILE_NAME}" ]; then
          if [[ "${FILE_NAME}" == "Dockerfile.single" ]]; then
           FILE_NAME="Dockerfile"
          fi
        
          echo "✅ Using project-specific ${FILE_NAME}"
          cat "{{.PROJECT_ROOT_DIR}}/${FILE_NAME}" > "{{.ROOT_DIR2}}/Dockerfile.tmp"
        elif [ -f "{{.TASKFILE_DIR2}}/docker/${FILE_NAME}" ]; then
          echo "✅ Using shared ${FILE_NAME} from {{.TASKFILE_DIR2}}/docker directory"
          cat "{{.TASKFILE_DIR2}}/docker/${FILE_NAME}" > "{{.ROOT_DIR2}}/Dockerfile.tmp"
        else
          echo "❌ Error: ${FILE_NAME} not found in project or shared directory."
          exit 1
        fi
      - |
        set -euo pipefail
        
        parse_image_repo() {
          local raw="$1"
          local default="{{.REPO_NAME}}"
          local r="${raw%:*}"
          local i="${raw#*:}"
          
          # If no colon was present, %:* returns the whole string
          if [[ "$raw" != *":"* ]]; then r=""; i="$raw"; fi
          
          echo "${r:-$default}" "$i"
        }
        
        BASE_IMAGE_NAME="{{.COMPOSITE_BASE_IMAGE_NAME}}"
        PLUGIN_IMAGES="{{.COMPOSITE_PLUGINS_IMAGE_NAME}}"
        GHCR_PAT="{{.GHCR_PAT}}"
        GITHUB_ACTOR="{{.GITHUB_ACTOR}}"
        
        get_ghcr_token() {
          local repo="$1"
          curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" \
            -u "${GITHUB_ACTOR}:${GHCR_PAT}" | jq -r '.token'
        }

        mkdir -p .ghcr_state
        
        WATCHED_IMAGES="$BASE_IMAGE_NAME $PLUGIN_IMAGES"
        declare -A DIGESTS
        declare -A TAGS
        CHANGED=0

        for image in $WATCHED_IMAGES; do
          read -r image_repo image_name <<< $(parse_image_repo "${image}")
        
          FULL_PATH="{{.ORG_NAME}}/${image_repo}/images/${image_name}"
        
          echo "Getting token for: ${FULL_PATH}"
        
          TOKEN=$(get_ghcr_token "${FULL_PATH}")
        
          echo "Token received for: ${FULL_PATH}"
        
          TAG_RESPONSE=$(curl -s -H "Accept: application/vnd.github+json" "https://api.github.com/repos/{{.ORG_NAME}}/${image_repo}/tags")
          TAG="null"
          if echo "$TAG_RESPONSE" | {{.JQ}} -e 'type == "array"' > /dev/null; then
            TAG=$(echo "$TAG_RESPONSE" | {{.JQ}} -r '.[].name' | sort -V | tail -n1)
          else
            echo "Error fetching tags for https://api.github.com/repos/{{.ORG_NAME}}/${image_repo}/tags -> ${TAG_RESPONSE}"
            exit 1
          fi
          
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "❌ No tags found"
            exit 1
          fi
          
          echo "Using https://api.github.com/repos/{{.ORG_NAME}}/${image_repo}/tags -> ${TAG}"
          
          DIGEST_RESPONSE=$(curl -fsSLI -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            "https://ghcr.io/v2/${FULL_PATH}/manifests/${TAG}-{{.OS}}-{{.ARCH}}")
        
          echo "Digest Response: ${DIGEST_RESPONSE}"
        
          DIGEST=$(echo "$DIGEST_RESPONSE" | grep -i 'Docker-Content-Digest' | awk '{print $2}' | tr -d '\r')
          echo "Digest: $DIGEST"

          if [ -z "$DIGEST" ]; then
            echo "❌ Could not retrieve digest for ${FULL_PATH}:${TAG}"
            exit 1
          fi

          DIGESTS[$image]="$DIGEST"
          TAGS[$image]="$TAG"

          STATE_FILE=".ghcr_state/${image}.digest"
          LAST_DIGEST=$(cat "$STATE_FILE" 2>/dev/null || echo "")
          if [ "$DIGEST" != "$LAST_DIGEST" ]; then
            echo "$DIGEST" > "$STATE_FILE"
            CHANGED=1
          fi
        done
        
        MAIN_TAG="${TAGS[$BASE_IMAGE_NAME]}"
        
        # Start with the clean MAIN_TAG (no numbers)
        CANDIDATE_TAG="${MAIN_TAG}"
        COUNTER=1
        
        while true; do
          COMPOSITE_PATH="https://ghcr.io/v2/{{.ORG_NAME}}/{{.REPO_NAME}}/images/{{.COMPOSITE_COMPONENT_NAME}}/manifests/${CANDIDATE_TAG}"
        
          # Check status
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.oci.image.manifest.v1+json" "$COMPOSITE_PATH")
          
          if [ "$STATUS" -eq 404 ]; then
            # 404 means the tag does not exist yet, so it is safe to use.
            echo "✅ Found available tag: ${CANDIDATE_TAG}"
            break
          elif [ "$STATUS" -eq 200 ]; then
            # 200 means the tag exists. generate the next candidate (e.g., v1.0.0-1, v1.0.0-2)
            echo "⚠️ Tag ${CANDIDATE_TAG} already exists. Trying next increment..."
            CANDIDATE_TAG="${MAIN_TAG}-${COUNTER}"
            COUNTER=$((COUNTER + 1))
          else
            # Handle unexpected errors (e.g., 401 Unauthorized, 500 Server Error)
            echo "❌ Unexpected status code ($STATUS) while checking tag ${CANDIDATE_TAG}. Exiting."
            exit 1
          fi
        done
        
        # Finally, update the MAIN_TAG variable to the free one found
        MAIN_TAG="${CANDIDATE_TAG}"

        if [ "$CHANGED" -eq 0 ]; then
          echo "ℹ️  No image updates detected. Nothing to build."
          exit 1
        fi


        BUILD_ARGS=()
  
        for image in $WATCHED_IMAGES; do
          read -r image_repo image_name <<< $(parse_image_repo "${image}")
        
          VAR_NAME=$(echo "$image_name" | tr '[:lower:]-' '[:upper:]_')
          VALUE=${TAGS[$image]}
          if [ -z "$VALUE" ]; then
            echo "❌ Tag missing for image: $image"
            exit 1
          fi
          BUILD_ARGS+=(--build-arg "${VAR_NAME}_IMAGE=${VALUE}-{{.OS}}-{{.ARCH}}")
        done


        IMAGE_TAG="{{.BASE_IMAGE}}:$MAIN_TAG"
        MULTI_ARCH_IMAGE_TAG="${IMAGE_TAG}-{{.OS}}-{{.ARCH}}"
        
        echo "✅ docker buildx build --load --builder {{.DOCKER_BUILDER_NAME}} ${BUILD_ARGS[@]} --platform {{.OS}}/{{.ARCH}} -t $MULTI_ARCH_IMAGE_TAG -f {{.ROOT_DIR2}}/Dockerfile.tmp"
        docker buildx build --load --builder {{.DOCKER_BUILDER_NAME}} ${BUILD_ARGS[@]} --platform {{.OS}}/{{.ARCH}} -t $MULTI_ARCH_IMAGE_TAG -f {{.ROOT_DIR2}}/Dockerfile.tmp .
        docker push $MULTI_ARCH_IMAGE_TAG
        docker manifest create  $IMAGE_TAG --amend $MULTI_ARCH_IMAGE_TAG
        
        #task build:img:sign VERSION="${MAIN_TAG}-{{.OS}}-{{.ARCH}}" BASE_IMAGE="{{.BASE_IMAGE}}" CRANE_PLATFORM="--platform={{.OS}}/{{.ARCH}}"
        # Signing the image
        if [ "{{.IMAGE_SIGNING_ENABLED}}" != "true" ]; then
          echo "⚠️ Image signing is disabled (IMAGE_SIGNING_ENABLED is not 'true'). Skipping."
          exit 0
        fi
        
        set -eu
        
        if [ -z "$COSIGN_PRIVATE_KEY" ] || [ -z "$COSIGN_PASSWORD" ]; then
          echo "❌ Error: Missing COSIGN_PRIVATE_KEY or COSIGN_PASSWORD." >&2
          exit 1
        fi
        
        trap 'rm -f "{{.ROOT_DIR2}}/cosign.key"' EXIT
        echo "$COSIGN_PRIVATE_KEY" > "{{.ROOT_DIR2}}/cosign.key"
        
        DIGEST=$({{.CRANE}} digest --platform={{.OS}}/{{.ARCH}} ${MULTI_ARCH_IMAGE_TAG})
        {{.COSIGN}} sign --yes --key "{{.ROOT_DIR2}}/cosign.key" "{{.BASE_IMAGE}}@$DIGEST"
        echo "✅ Successfully signed image: {{.BASE_IMAGE}}@$DIGEST"
        
        rm -f "{{.ROOT_DIR2}}/Dockerfile.tmp"
    internal: true

  push-manifest-internal:
    desc: "  Push the manifest for a single component's image."
    deps:
      - tools:jq
    requires:
      vars:
        - BASE_IMAGE
        - COMPOSITE_BASE_IMAGE_NAME
        - COMPOSITE_COMPONENT_NAME
        - IMAGE_SIGNING_ENABLED
        - GHCR_PAT
        - GITHUB_ACTOR
    cmd: |
        set -euo pipefail
      
        GHCR_PAT="{{.GHCR_PAT}}"
        GITHUB_ACTOR="{{.GITHUB_ACTOR}}"
        
        get_ghcr_token() {
          local repo="$1"
          curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" \
            -u "${GITHUB_ACTOR}:${GHCR_PAT}" | jq -r '.token'
        }
      
        parse_image_repo() {
          local raw="$1"
          local default="{{.REPO_NAME}}"
          local r="${raw%:*}"
          local i="${raw#*:}"
        
          # If no colon was present, %:* returns the whole string
          if [[ "$raw" != *":"* ]]; then r=""; i="$raw"; fi
        
          echo "${r:-$default}" "$i"
        }
        
        mkdir -p .ghcr_state
      
        read -r image_repo image_name <<< $(parse_image_repo "{{.COMPOSITE_BASE_IMAGE_NAME}}")
      
        TAG_RESPONSE=$(curl -s -H "Accept: application/vnd.github+json" "https://api.github.com/repos/{{.ORG_NAME}}/${image_repo}/tags")
        TAG="null"
        if echo "$TAG_RESPONSE" | {{.JQ}} -e 'type == "array"' > /dev/null; then
          TAG=$(echo "$TAG_RESPONSE" | {{.JQ}} -r '.[].name' | sort -V | tail -n1)
        else
          echo "Error fetching tags for https://api.github.com/repos/{{.ORG_NAME}}/${image_repo}/tags -> ${TAG_RESPONSE}"
          exit 1
        fi
      
        # 1. Initialize variables
        CANDIDATE_TAG="${TAG}"
        COUNTER=1
        TOKEN=$(get_ghcr_token "{{.ORG_NAME}}/{{.REPO_NAME}}/images/{{.COMPOSITE_COMPONENT_NAME}}")
        while true; do
          # Check if this specific tag already exists in the registry
          COMPOSITE_PATH="https://ghcr.io/v2/{{.ORG_NAME}}/{{.REPO_NAME}}/images/{{.COMPOSITE_COMPONENT_NAME}}/manifests/${CANDIDATE_TAG}"
        
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.oci.image.manifest.v1+json" "$COMPOSITE_PATH")
          
          if [ "$STATUS" -eq 404 ]; then
            # 404 means the tag is FREE. We can use it.
            echo "✅ Tag ${CANDIDATE_TAG} is available."
            break
          elif [ "$STATUS" -eq 200 ]; then
            # 200 means tag EXISTS. We must increment.
            # Uses hyphen format: v2.0.39 -> v2.0.39-1
            echo "⚠️ Tag ${CANDIDATE_TAG} already exists. Incrementing..."
            CANDIDATE_TAG="${TAG}-${COUNTER}"
            COUNTER=$((COUNTER + 1))
          else
            echo "❌ Error checking tag status (HTTP $STATUS). Exiting."
            exit 1
          fi
        done
          
          # 2. CRITICAL: Update the global TAG variable so the next docker command uses the new one
        TAG="${CANDIDATE_TAG}"
        echo "Final Tag to use: $TAG"
        
        docker manifest push {{.BASE_IMAGE}}:$TAG
  
        # task build:img:sign VERSION="${TAG}" BASE_IMAGE="{{.BASE_IMAGE}}" CRANE_PLATFORM=""
        # Signing the image
        if [ "{{.IMAGE_SIGNING_ENABLED}}" != "true" ]; then
          echo "⚠️ Image signing is disabled (IMAGE_SIGNING_ENABLED is not 'true'). Skipping."
          exit 0
        fi
        
        set -eu
        
        if [ -z "$COSIGN_PRIVATE_KEY" ] || [ -z "$COSIGN_PASSWORD" ]; then
          echo "❌ Error: Missing COSIGN_PRIVATE_KEY or COSIGN_PASSWORD." >&2
          exit 1
        fi
        
        trap 'rm -f "{{.ROOT_DIR2}}/cosign.key"' EXIT
        echo "$COSIGN_PRIVATE_KEY" > "{{.ROOT_DIR2}}/cosign.key"
        
        DIGEST=$({{.CRANE}} digest {{.BASE_IMAGE}}:$TAG)
        {{.COSIGN}} sign --yes --key "{{.ROOT_DIR2}}/cosign.key" "{{.BASE_IMAGE}}@$DIGEST"
        echo "✅ Successfully signed image: {{.BASE_IMAGE}}@$DIGEST"
    internal: true
