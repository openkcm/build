name: ci

on:
  workflow_call:
    inputs:
      run_task_tests:
        description: "Run task tests"
        required: false
        type: boolean
        default: true
      run_makefile_tests:
        description: "Run makefile tests"
        required: false
        type: boolean
        default: false
      makefile_test_name:
        description: "Makefile task test name"
        required: false
        type: string
        default: "test"
      makefile_test_coverage_report_paths:
        description: "Coverage report paths (space-separated)"
        required: false
        type: string
        default: "cover.html cover.out cover.root.out cover.root.html"
      enable_sonar_scan:
        description: "Enabling Sonar Scan task"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-and-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Init
        id: init
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
        run: |
          if [[ "$EVENT" == "pull_request" ]]; then
            echo "internal_pr=$([[ "$HEAD_REPO" == "$REPO" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          else
            echo "internal_pr=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate token from GitHub App
        id: generate-token
        if: steps.init.outputs.internal_pr == 'true' && github.actor != 'dependabot[bot]'
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf  # v2.2.1
        with:
          app-id: ${{ secrets.APP_PUSH_TAG_ID }}
          private-key: ${{ secrets.APP_PUSH_TAG_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name }}"
          permission-contents: read

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token || github.token }}
          fetch-tags: true
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Checkout build (taskfiles) repo
        run: |
          rm -rf ./hack/common && git clone --branch main --single-branch https://github.com/openkcm/build.git ./hack/common

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 #v2.0.0
        with:
          version: 3.x
          repo-token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: task validate
        run: task validate --verbose

      - name: task unit tests
        if: ${{ inputs.run_task_tests }}
        run: task test --verbose

      - name: makefile advanced tests
        if: ${{ inputs.run_makefile_tests }}
        env:
          MAKEFILE_TEST_NAME: ${{ inputs.makefile_test_name }}
        run: |
          # Install bash if missing
          if ! command -v bash >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y bash
          fi

          # Run Makefile tests
          make "$MAKEFILE_TEST_NAME"

      - name: Save Metadata and Move Coverages
        if: always()
        env:
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          COVERAGE_PATHS_INPUT: ${{ inputs.makefile_test_coverage_report_paths }}
        run: |
          mkdir -p pr-metadata
          mkdir -p coverage

          # Only populate PR metadata if it is a Pull Request
          if [ "$EVENT" == "pull_request" ]; then
            echo "$PR_NUMBER" > pr-metadata/pr_number
            echo "$PR_HEAD_REF" > pr-metadata/pr_head_ref
            echo "$PR_BASE_REF" > pr-metadata/pr_base_ref
            echo "$PR_HEAD_SHA" > pr-metadata/pr_head_sha
          fi

          # Move coverage files and build a comma-separated list for Sonar
          SONAR_PATHS=""
          for file in $COVERAGE_PATHS_INPUT; do
            if [ -f "$file" ]; then
              mv "$file" coverage/
              if [ -z "$SONAR_PATHS" ]; then
                SONAR_PATHS="coverage/$file"
              else
                SONAR_PATHS="$SONAR_PATHS,coverage/$file"
              fi
            fi
          done

          # Save the dynamic paths into the metadata folder
          echo "$SONAR_PATHS" > pr-metadata/coverage_paths

      - name: Debug Coverage Generation
        if: always()
        env:
          COVERAGE_PATHS_INPUT: ${{ inputs.makefile_test_coverage_report_paths }}
        run: |
          echo "Looking for files defined in input: $COVERAGE_PATHS_INPUT"
          echo "Current directory contents:"
          ls -la
          echo "Searching for any coverage files in all subdirectories:"
          find . -name "*.html" -o -name "*.out"

      - name: Upload Coverages and PR Metadata
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage/
            pr-metadata/
          if-no-files-found: warn
          retention-days: 1
