name: Sonar Analysis Secure

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read
  statuses: write

jobs:
  sonarcloud:
    name: Sonar Scanning
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        continue-on-error: true
        id: download-artifact
        with:
          name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ${{ runner.temp }}/safe-artifacts

      - name: Check if Sonar Scan is required
        id: check-scan
        run: |
          if [ "${{ steps.download-artifact.outcome }}" == "success" ]; then
            echo "run_scan=true" >> $GITHUB_OUTPUT
          else
            echo "run_scan=false" >> $GITHUB_OUTPUT
          fi

      - name: Read PR Metadata
        if: steps.check-scan.outputs.run_scan == 'true'
        id: pr-metadata
        run: |
          # 1. Read the dynamic coverage paths (runs on both PRs and main branch)
          if [ -f "${{ runner.temp }}/safe-artifacts/pr-metadata/coverage_paths" ]; then
            echo "coverage_paths=$(cat ${{ runner.temp }}/safe-artifacts/pr-metadata/coverage_paths)" >> $GITHUB_OUTPUT
          else
            echo "coverage_paths=" >> $GITHUB_OUTPUT
          fi
          
          # 2. Read PR specific data (only exists on PRs)
          if [ -f "${{ runner.temp }}/safe-artifacts/pr-metadata/pr_number" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=$(cat ${{ runner.temp }}/safe-artifacts/pr-metadata/pr_number)" >> $GITHUB_OUTPUT
            echo "pr_head_ref=$(cat ${{ runner.temp }}/safe-artifacts/pr-metadata/pr_head_ref)" >> $GITHUB_OUTPUT
            echo "pr_base_ref=$(cat ${{ runner.temp }}/safe-artifacts/pr-metadata/pr_base_ref)" >> $GITHUB_OUTPUT
            echo "pr_head_sha=$(cat ${{ runner.temp }}/safe-artifacts/pr-metadata/pr_head_sha)" >> $GITHUB_OUTPUT
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore Artifacts to Workspace
        if: steps.check-scan.outputs.run_scan == 'true'
        run: |
          # Only copy the directories if they were successfully downloaded
          if [ -d "${{ runner.temp }}/safe-artifacts/coverage" ]; then
            cp -r ${{ runner.temp }}/safe-artifacts/coverage ./coverage
          fi
          
          if [ -d "${{ runner.temp }}/safe-artifacts/pr-metadata" ]; then
            cp -r ${{ runner.temp }}/safe-artifacts/pr-metadata ./pr-metadata
          fi

      - name: Debug Coverage Generation
        if: steps.check-scan.outputs.run_scan == 'true'
        run: |
          echo "Current directory contents:"
          ls -la
          echo "Searching for any coverage files in all subdirectories:"
          find . -name "*.html" -o -name "*.out" -o -name "*.zip" || true

      - name: Build Sonar Arguments
        if: steps.check-scan.outputs.run_scan == 'true' && !contains(github.event.workflow_run.actor.login, 'dependabot')
        id: build-args
        run: |
          ORG_KEY=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PROJECT_KEY="${ORG_KEY}_${{ github.event.repository.name }}"
          
          # Added the exclusions flag to the baseline arguments
          ARGS="-Dsonar.projectKey=$PROJECT_KEY \
                -Dsonar.projectName=${{ github.event.repository.name }} \
                -Dsonar.organization=$ORG_KEY \
                -Dsonar.scm.revision=${{ steps.pr-metadata.outputs.pr_head_sha || github.event.workflow_run.head_sha }} \
                -Dsonar.exclusions=**/*.html"
          
          # Conditionally append the coverage paths flag ONLY if paths exist
          COVERAGE_PATHS="${{ steps.pr-metadata.outputs.coverage_paths }}"
          if [ -n "$COVERAGE_PATHS" ]; then
            ARGS="$ARGS -Dsonar.go.coverage.reportPaths=$COVERAGE_PATHS"
          fi
          
          # Handle PR vs Branch logic
          if [ "${{ steps.pr-metadata.outputs.is_pr }}" == "true" ]; then
            ARGS="$ARGS \
                  -Dsonar.pullrequest.key=${{ steps.pr-metadata.outputs.pr_number }} \
                  -Dsonar.pullrequest.branch=${{ steps.pr-metadata.outputs.pr_head_ref }} \
                  -Dsonar.pullrequest.base=${{ steps.pr-metadata.outputs.pr_base_ref }}"
          else
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
            if [ "$BRANCH_NAME" != "main" ] && [ "$BRANCH_NAME" != "master" ]; then
              ARGS="$ARGS -Dsonar.branch.name=$BRANCH_NAME"
            fi
          fi
          
          echo "sonar_args=$ARGS" >> $GITHUB_OUTPUT

      - name: SonarCloud Scan
        if: steps.check-scan.outputs.run_scan == 'true' && !contains(github.event.workflow_run.actor.login, 'dependabot')
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: ${{ steps.build-args.outputs.sonar_args }}

      - name: SonarCloud Quality Gate check
        if: steps.check-scan.outputs.run_scan == 'true' && !contains(github.event.workflow_run.actor.login, 'dependabot')
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Report Action Status to PR
        if: always() && steps.check-scan.outputs.run_scan == 'true' && steps.pr-metadata.outputs.is_pr == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_HEAD_SHA: ${{ steps.pr-metadata.outputs.pr_head_sha }}
          JOB_STATUS: ${{ job.status }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = process.env.PR_HEAD_SHA;
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: state,
              context: 'Sonar Analysis Secure',
              description: `Workflow finished with state: ${state}`,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });