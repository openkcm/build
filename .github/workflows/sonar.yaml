name: Sonar Analysis Secure

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read
  statuses: write

jobs:
  sonarcloud:
    name: Sonar Scanning
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        continue-on-error: true
        id: download-artifact
        with:
          name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Check if Sonar Scan is required
        id: check-scan
        run: |
          if [ "${{ steps.download-artifact.outcome }}" == "success" ]; then
            echo "run_scan=true" >> $GITHUB_OUTPUT
          else
            echo "run_scan=false" >> $GITHUB_OUTPUT
          fi

      - name: Read PR Metadata
        if: steps.check-scan.outputs.run_scan == 'true'
        id: pr-metadata
        run: |
          if [ -d "pr-metadata" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=$(cat pr-metadata/pr_number)" >> $GITHUB_OUTPUT
            echo "pr_head_ref=$(cat pr-metadata/pr_head_ref)" >> $GITHUB_OUTPUT
            echo "pr_base_ref=$(cat pr-metadata/pr_base_ref)" >> $GITHUB_OUTPUT
            echo "pr_head_sha=$(cat pr-metadata/pr_head_sha)" >> $GITHUB_OUTPUT
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository at PR commit
        if: steps.check-scan.outputs.run_scan == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ steps.pr-metadata.outputs.pr_head_sha || github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: SonarQube Scan
        if: steps.check-scan.outputs.run_scan == 'true'
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.go.coverage.reportPaths=cover.out
            -Dsonar.scm.revision=${{ steps.pr-metadata.outputs.pr_head_sha }}
            -Dsonar.pullrequest.key=${{ steps.pr-metadata.outputs.pr_number }}
            -Dsonar.pullrequest.branch=${{ steps.pr-metadata.outputs.pr_head_ref }}
            -Dsonar.pullrequest.base=${{ steps.pr-metadata.outputs.pr_base_ref }}

      - name: SonarQube Quality Gate check
        if: steps.check-scan.outputs.run_scan == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Report Action Status to PR
        if: always() && steps.check-scan.outputs.run_scan == 'true' && steps.pr-metadata.outputs.is_pr == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_HEAD_SHA: ${{ steps.pr-metadata.outputs.pr_head_sha }}
          JOB_STATUS: ${{ job.status }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = process.env.PR_HEAD_SHA;
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: state,
              context: 'Sonar Analysis Secure',
              description: `Workflow finished with state: ${state}`,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });