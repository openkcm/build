name: Labeler

on:
  workflow_call:

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # Needed for non-fork PR labeling

    steps:
      - name: Init
        id: init
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
        run: |
          internal_pr=false
          if [[ "$EVENT" == "pull_request" ]]; then
            [[ "$HEAD_REPO" == "$REPO" ]] && internal_pr=true || internal_pr=false
          else
            internal_pr=true
          fi
          echo "internal_pr=${internal_pr}" >> "$GITHUB_OUTPUT"

      - name: Generate token from GitHub App
        id: generate-token
        if: steps.init.outputs.internal_pr == 'true' && github.actor != 'dependabot[bot]'
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf  # v2.2.1
        with:
          app-id: ${{ secrets.APP_PUSH_TAG_ID }}
          private-key: ${{ secrets.APP_PUSH_TAG_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name }}"
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.generate-token.outputs.token || github.token }}
          fetch-tags: true
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Checkout build (taskfiles) repo
        run: |
          rm -rf ./hack/common && git clone --branch main --single-branch https://github.com/openkcm/build.git ./hack/common

      - name: Copy labeler.yml
        run: |
          cp ./hack/common/.github/labeler.yml .github/labeler.yml

      - name: Run labeler
        if: steps.init.outputs.internal_pr == 'true'
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b #v6.0.1
        with:
          repo-token: ${{ steps.generate-token.outputs.token || github.token }}
