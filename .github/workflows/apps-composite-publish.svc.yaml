name: Publish Composite

on:
  workflow_call:
    secrets:
      OCM_PRIVATE_KEY:
        required: false
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false
    inputs:
      image_signing_enabled:
        description: 'Enable image signing (true|false)'
        required: false
        default: false
        type: boolean # Use boolean type
      ocm_signing_enabled:
        description: 'Enable OCM signing (true|false)'
        required: false
        default: false
        type: boolean # Use boolean type

permissions:
  packages: write
  contents: read

jobs:
  push-composite:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token from GitHub App
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf  # v2.2.1
        with:
          app-id: ${{ secrets.APP_PUSH_TAG_ID }}
          private-key: ${{ secrets.APP_PUSH_TAG_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-packages: write
          repositories: "${{ github.event.repository.name }}"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-tags: true
          fetch-depth: 0
          submodules: recursive

      - name: Checkout build (taskfiles) repo
        run: |
          rm -rf ./hack/common && git clone --branch main --single-branch https://github.com/openkcm/build.git ./hack/common

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 #v2.0.0
        with:
          version: 3.x
          repo-token: ${{ steps.generate-token.outputs.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Context for Buildx
        id: buildx-context
        run: |
          docker context create builders

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        timeout-minutes: 5
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: latest

      - name: Build & Push Image
        env:
          IMAGE_SIGNING_ENABLED: ${{ inputs.image_signing_enabled }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          OCM_SIGNING_ENABLED: ${{ inputs.ocm_signing_enabled }}
          OCM_PRIVATE_KEY: ${{ secrets.OCM_PRIVATE_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_PAT: ${{  steps.generate-token.outputs.token }}
        run: |
          task build:apps[composite]:all --verbose
          
      - name: Build and Push OCM Component
        env:
          OCM_PRIVATE_KEY: ${{ secrets.OCM_PRIVATE_KEY }}
          OCM_SIGNING_ENABLED: ${{ inputs.ocm_signing_enabled }}
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_PAT: ${{  steps.generate-token.outputs.token }}
        run: |
          task build:ocm:all --verbose
