name: Publish UI

on:
  workflow_call:
    secrets:
      OCM_PRIVATE_KEY:
        required: false
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false
      APP_PUSH_TAG_ID: # Added for visibility
        required: true
      APP_PUSH_TAG_PRIVATE_KEY: # Added for visibility
        required: true
    inputs:
      image_signing_enabled:
        description: 'Enable image signing (true|false)'
        required: false
        default: false
        type: boolean
      ocm_signing_enabled:
        description: 'Enable OCM signing (true|false)'
        required: false
        default: false
        type: boolean

permissions:
  packages: write
  contents: read

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token from GitHub App
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf  # v2.2.1
        with:
          app-id: ${{ secrets.APP_PUSH_TAG_ID }}
          private-key: ${{ secrets.APP_PUSH_TAG_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-packages: write
          repositories: "${{ github.event.repository.name }}"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-tags: true
          fetch-depth: 0
          submodules: recursive

      - name: Checkout build (taskfiles) repo
        run: |
          git clone --branch main --single-branch https://github.com/openkcm/build.git ./hack/common

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 #v2.0.0
        with:
          version: 3.x
          repo-token: ${{ steps.generate-token.outputs.token }}

#      - name: Set up Node.js
#        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
#        with:
#          node-version: '22' # Specify your UI version (e.g., 18, 20, 22)
#          cache: 'npm'       # Or 'yarn' / 'pnpm'
#
#      - name: Install UI Dependencies
#        run: npm ci
#
#      - name: Run UI Security Scan (Snyk or Audit)
#        run: npm audit --audit-level=high
#
#      - name: Run trivy repository security scanner
#        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 #v0.34.2
#        with:
#          token-setup-trivy: ${{ steps.generate-token.outputs.token }}
#          scan-type: repository
#          format: json
#          output: trivy-repository-vuln.json
#          severity: CRITICAL,HIGH,MEDIUM

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        timeout-minutes: 5
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: latest

      - name: Build and Push UI Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGE_SIGNING_ENABLED: ${{ inputs.image_signing_enabled }}
          IMAGE_NAME: ${{ github.event.repository.name }}
        run: |
          task build:img:ui-build --verbose

      - name: Package and Push Helm Charts
        run: |
          task build:helm:all --verbose